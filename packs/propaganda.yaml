id: propaganda
capabilities:
  - propaganda_analysis
  - social_effect_analysis
description: >
  The Propaganda Pack provides tools for identifying propaganda techniques and
  systematically assessing whether a communication qualifies as propaganda.

  Two frameworks serve different purposes and should be used together:

  The Institute for Propaganda Analysis (IPA) framework identifies the seven
  propaganda devices described in 1937: name calling, glittering generalities,
  transfer, testimonial, plain folks, card stacking, and bandwagon. It is
  device-level and bottom-up — useful for identifying specific techniques in
  specific sentences.

  Jowett and O'Donnell's framework provides a working definition of propaganda
  (distinguishing it from persuasion and information) and a ten-step analytical
  method for systematic institutional analysis. It is definitional and top-down
  — use it when assessing whether a communication as a whole qualifies as
  propaganda.

  Critical constraint: Applying the label "propaganda" to a text is itself an
  interpretive act requiring evidence. Propaganda is defined by communicator
  intent, which cannot be directly observed. All propaganda classification
  findings must be stated as H1 (hypothesis), grounded in evidence from the
  ten-step analysis. Device identification (IPA) is R1 or D1; propaganda
  classification (Jowett & O'Donnell) is always H1.
frameworks:
  - id: propaganda-ipa
    maturity: draft
    note: >
      Institute for Propaganda Analysis seven devices: name calling, glittering
      generalities, transfer, testimonial, plain folks, card stacking, bandwagon.
      Device-level, bottom-up technique identification. Historical taxonomy (1937);
      use alongside Jowett & O'Donnell for a complete analysis. Device findings
      are R1. Propaganda classification is H1.
      YAML and companion .md implemented. Not yet verified against original sources.

  - id: propaganda-jowett-odonnell
    maturity: draft
    note: >
      Jowett and O'Donnell's Propaganda and Persuasion. Working definition
      distinguishing propaganda from persuasion and information; ten-step analysis
      method covering ideology, context, propagandist, organisation, audience,
      media, techniques, audience reaction, counter-propaganda, and effects.
      Definitional and institutional — use when assessing whether a communication
      as a whole qualifies as propaganda. All propaganda classification is H1.
      YAML and companion .md implemented. Not yet verified against original sources.
