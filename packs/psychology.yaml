id: psychology
capabilities:
  - cognitive_effect_analysis
  - social_effect_analysis
description: >
  The Psychology Pack provides tools for identifying possible cognitive and social
  effects of communication. All findings in this pack are possible patterns (C1),
  possible social effects (S1), or hypotheses (H1). This pack does not establish
  that specific texts caused specific psychological outcomes in any real audience.

  Kahneman and Tversky's dual-process framework identifies structural patterns
  associated with cognitive shortcuts (anchoring, availability, loss aversion,
  System 1 activation). Haidt's Moral Foundations Theory identifies which moral
  vocabulary a text deploys and which foundations it plausibly appeals to.

  Important: Both frameworks are applied to text structure, not to audience
  cognition. Haidt's MFT is contested within moral psychology and must not
  be presented as established psychological science. All findings require
  cautious language.
frameworks:
  - id: psychology-kahneman-tversky
    maturity: draft
    note: >
      Kahneman and Tversky's dual-process theory and cognitive biases. Identifies
      anchoring patterns, availability-activating examples, loss framing, and
      System 1 activation patterns. All findings are C1 (possible cognitive effect).
      Primary source: Kahneman (2011) and Kahneman, Slovic & Tversky (1982).
      YAML and companion .md implemented. Not yet verified against original sources.

  - id: psychology-haidt
    maturity: draft
    note: >
      Haidt's Moral Foundations Theory. Identifies moral vocabulary and the
      foundations it plausibly activates (care, fairness, loyalty, authority,
      sanctity, liberty). Contested within moral psychology — must not be
      presented as established science. All findings are C1 or H1.
      Primary source: Haidt & Graham (2007); accessible source: Haidt (2012).
      YAML and companion .md implemented. Not yet verified against original sources.
