id: framing-rhetoric
capabilities:
  - framing_analysis
  - rhetoric_analysis
description: >
  The Framing and Rhetoric Pack covers how communication defines problems, assigns
  causes, makes moral evaluations, and implies solutions (framing), and how speakers
  build credibility, activate emotion, structure reasoning, and make value claims
  seem reasonable (rhetoric). The four frameworks are complementary: Entman maps
  the structural four-part frame; Lakoff explains the cognitive mechanism by which
  frames work and why rebuttal can backfire; Aristotle identifies the three modes
  of appeal and the enthymeme; Perelman provides a systematic taxonomy of
  argumentation schemes — especially quasi-logical arguments and dissociation —
  and the universal audience concept. Together they provide a complete analytical
  toolkit for political and persuasive communication.
frameworks:
  - id: framing-entman
    maturity: draft
    note: >
      Robert Entman's four-part framing model: problem definition, causal
      interpretation, moral evaluation, treatment recommendation. The primary
      structural framing framework. Use for: mapping what a frame says.
      YAML and companion .md implemented. Not yet verified against original sources.

  - id: framing-lakoff
    maturity: draft
    note: >
      George Lakoff's cognitive framing theory: conceptual metaphors, frame
      activation, moral models (strict father / nurturant parent), and the
      reframing problem. Use for: understanding why a frame works cognitively
      and why rebuttal can reinforce frames. YAML and companion .md implemented.
      Not yet verified against original sources.

  - id: rhetoric-aristotle
    maturity: draft
    note: >
      Aristotle's Rhetoric: ethos, pathos, logos, enthymeme, and audience
      positioning. The primary rhetoric framework. Use for: classifying the
      three modes of appeal and identifying unstated premises.
      YAML and companion .md implemented. Not yet verified against original sources.

  - id: rhetoric-perelman
    maturity: draft
    note: >
      Chaïm Perelman and Lucie Olbrechts-Tyteca's New Rhetoric: universal
      audience, presence, dissociation, and a systematic taxonomy of
      argumentation schemes (quasi-logical arguments, argument from analogy,
      argument from authority). Use for: identifying specific argument scheme
      types beyond ethos/pathos/logos, especially in value-based reasoning.
      YAML and companion .md implemented. Not yet verified against original sources.
