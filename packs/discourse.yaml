id: discourse
capabilities:
  - discourse_analysis
  - group_representation_analysis
  - social_effect_analysis
description: >
  The discourse pack provides critical discourse analysis capabilities. It covers
  how language constructs in-groups and out-groups, how groups are positively or
  negatively represented, how power relations are reproduced through text, and how
  discourse may contribute to prejudice, ideological polarisation, or minority
  splitting. It is the primary pack for analysing political language about migration,
  ethnicity, religion, nationality, and group identity.
frameworks:
  - id: discourse-van-dijk
    maturity: draft
    note: >
      Teun A. van Dijk's Critical Discourse Analysis. Covers the ideological square,
      positive self-presentation, negative other-presentation, disclaimers, and
      group hierarchy. YAML file implemented. Not yet verified against original sources.
  - id: discourse-fairclough
    maturity: planned
    note: >
      Norman Fairclough's three-dimensional discourse analysis (text, discursive
      practice, social practice). Adds a stronger emphasis on intertextuality and
      the relationship between discourse and social change. Framework YAML not yet written.
  - id: discourse-wodak
    maturity: planned
    note: >
      Ruth Wodak's Discourse-Historical Approach. Specialises in the analysis of
      prejudiced and discriminatory language in political and institutional contexts,
      with attention to historical framing. Framework YAML not yet written.
