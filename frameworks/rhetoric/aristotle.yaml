id: rhetoric-aristotle
name: Aristotle — Rhetoric
version: 0.1.0
domain: rhetoric
purpose: Analyze persuasion through ethos, pathos, logos, audience, and implied premises.
intents:
  - rhetoric_analysis
  - persuasion_analysis
  - debate_analysis
triggers:
  - rhetoric
  - persuasive
  - persuasion
  - speech
  - emotion
  - credibility
  - ethos
  - pathos
  - logos
anti_triggers:
  - pure fact lookup
core_concepts:
  - ethos
  - pathos
  - logos
  - audience
  - enthymeme
evidence_statuses:
  - O2
  - R1
  - L1
  - H1
analysis_steps:
  - Identify credibility strategy.
  - Identify emotional appeals.
  - Identify reasoning structure.
  - Identify unstated premises.
  - Explain audience positioning cautiously.
decision_rules:
  - IF the speaker claims moderation THEN analyze ethos.
  - IF fear, disgust, pride, anger, or resentment is activated THEN analyze pathos.
  - IF reasoning relies on an unstated premise THEN identify the enthymeme.
analysis_questions:
  - How does the speaker build credibility?
  - What emotion is activated?
  - What reasoning is offered?
  - What must the audience assume?
output_fields:
  - ethos
  - pathos
  - logos
  - enthymeme
  - audience_positioning
limitations:
  - Describes persuasion, not factual truth.
  - Does not prove intent.
references:
  - title: Rhetoric
    author: Aristotle
    note: Used for ethos, pathos, logos, and enthymeme.
